services:
  db:
    image: postgres:15-alpine
    container_name: masatakip-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: MasaTakipDb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: MasaTakip.API/Dockerfile
    container_name: masatakip-api
    restart: unless-stopped
    ports:
      - "5115:5115"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=MasaTakipDb;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./masa-takip-ui
      dockerfile: Dockerfile
      target: development
    container_name: masatakip-ui
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5173/api
    volumes:
      - ./masa-takip-ui:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
